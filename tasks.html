{% for task in tasks %}
<div class="card mb-3 shadow-sm" style="border-radius: 15px; border: none;">
    <div class="card-body d-flex align-items-center">
        <img src="{{ task.icon_url }}" width="50" height="50" style="border-radius: 12px; object-fit: cover;">
        
        <div class="ms-3">
            <h6 class="mb-0 fw-bold">{{ task.app_name }}</h6>
            <p class="text-success fw-bold mb-0">Reward: ₹{{ task.reward }}</p>
        </div>
        
        <div class="ms-auto">
            <a href="{{ task.affiliate_link }}" class="btn btn-primary btn-sm" style="border-radius: 20px;">Claim</a>
        </div>
    </div>
</div>
{% endfor %}
