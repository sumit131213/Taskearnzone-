<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarningHub - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow border-0 p-4 m-3" style="max-width: 400px; width: 100%; border-radius: 15px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">🚀 TaskEarnZone</h2>
            <p class="text-muted small">Create a new account to start earning</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger fw-bold small text-center p-2" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="text-start">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold text-secondary small">Username</label>
                <input type="text" name="username" class="form-control py-2" placeholder="Choose a username" required style="border-radius: 8px;">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold text-secondary small">Password</label>
                <input type="password" name="password" class="form-control py-2" placeholder="Create password (min 8 chars)" required style="border-radius: 8px;">
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary small">Confirm Password</label>
                <input type="password" name="password_confirm" class="form-control py-2" placeholder="Repeat your password" required style="border-radius: 8px;">
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm" style="border-radius: 8px;">
                Register Account
            </button>
        </form>

        <hr class="text-muted">

        <div class="text-center">
            <p class="small text-secondary mb-0">Already have an account?</p>
            <a href="{% url 'login' %}" class="fw-bold text-decoration-none text-primary">Login Here</a>
        </div>
    </div>

</body>
</html>
