<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Money - TaskEarnZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="{% url 'dashboard' %}">🚀 TaskEarnZone</a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-light me-3">Welcome, <b class="text-warning">{{ request.user.username }}</b></span>
                <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm fw-bold">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container my-5 text-center">
        <div class="card shadow border-0 mx-auto p-4" style="max-width: 450px; width: 100%; border-radius: 15px;">

            <h3 class="fw-bold mb-3 text-dark">Withdraw Money</h3>
            <p class="text-muted">Transfer your earnings directly to your account.</p>

            <div class="alert alert-secondary py-3 my-3" style="border-radius: 10px;">
                <span class="text-secondary d-block small fw-bold">AVAILABLE BALANCE</span>
                <h2 class="fw-bold text-success m-0">₹{{ balance }}</h2>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger fw-bold small my-2" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="mt-4 text-start">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Amount (₹)</label>
                    <input type="number" name="amount" class="form-control py-2" placeholder="Enter amount (Min ₹40)" required style="border-radius: 8px;">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">UPI ID / Paytm Number</label>
                    <input type="text" name="upi" class="form-control py-2" placeholder="example@upi or 9876xxxxxx" required style="border-radius: 8px;">
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold py-3 fs-6 shadow-sm mb-3" style="border-radius: 10px;">
                    Send Withdrawal Request 🚀
                </button>
            </form>

            <hr class="text-muted">

            <a href="{% url 'dashboard' %}" class="text-decoration-none fw-bold text-secondary small">
                ← Back to Dashboard
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
