<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskEarnZone - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="card shadow border-0 p-4 m-3" style="max-width: 400px; width: 100%; border-radius: 15px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">🚀 TaskEarnZone</h2>
            <p class="text-muted small">Log in to access your dashboard</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger fw-bold small text-center p-2" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="text-start">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold text-secondary small">Gamil.com</label>
                <input type="text" name="username" class="form-control py-2" placeholder="Enter username" required style="border-radius: 8px;">
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary small">Password</label>
                <input type="password" name="password" class="form-control py-2" placeholder="Enter password" required style="border-radius: 8px;">
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm mb-3" style="border-radius: 8px;">
                Log In
            </button>
        </form>

<div style="margin-top: 20px; text-align: center; font-size: 13px;">
    <p>Don't have an account?
        <a href="/register/" style="color: #007bff; text-decoration: none; font-weight: bold;">Create New Account</a>
    </p>

    <p style="margin-top: 10px; color: #666;">
        <a href="/privacy-policy/" style="color: #555; text-decoration: none;">Privacy Policy</a> |
        <a href="mailto:rds74174rds@gmail.com" style="color: #555; text-decoration: none;">Contact Support</a>
    </p>
</div>
</body>
</html>
